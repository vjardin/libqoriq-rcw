#
# CI for libqoriq-rcw.
# Builds the library with sanitizers and runs the cmocka test suite on a
# matrix of {x86_64, ARM64} x {gcc, clang}. Also runs shellcheck on any
# shell scripts and verifies meson dist produces a clean source tarball.

name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
        cc: [gcc, clang]
    runs-on: ${{ matrix.os }}
    name: build+test (${{ matrix.os }}, ${{ matrix.cc }})
    env:
      CC: ${{ matrix.cc }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config \
            libcmocka-dev libmcpp-dev pandoc \
            gcc clang libclang-rt-18-dev

      - name: meson setup (with AddressSanitizer + UBSan)
        # b_lundef=false is required when building shared libraries
        # with clang sanitizers: clang expects the sanitizer runtime
        # symbols to remain undefined at link time and be resolved
        # at load time, which conflicts with meson's default
        # -Wl,--no-undefined.
        run: meson setup build -Db_sanitize=address,undefined -Db_lundef=false

      - name: meson compile
        run: meson compile -C build

      - name: meson test
        run: meson test -C build --print-errorlogs

      - name: Upload meson logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: meson-logs-${{ matrix.os }}-${{ matrix.cc }}
          path: build/meson-logs/

  shellcheck:
    runs-on: ubuntu-24.04
    name: shellcheck
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck

      - name: Run shellcheck on all shell scripts
        run: |
          shopt -s globstar nullglob
          files=(**/*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No shell scripts found, skipping."
            exit 0
          fi
          shellcheck --severity=style "${files[@]}"

  dist:
    runs-on: ubuntu-24.04
    name: meson dist
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            meson ninja-build pkg-config libcmocka-dev libmcpp-dev pandoc

      - name: meson setup
        run: meson setup build

      - name: meson dist
        run: meson dist -C build --no-tests

      - name: Upload dist tarball
        uses: actions/upload-artifact@v4
        with:
          name: dist-tarball
          path: build/meson-dist/*.tar.xz

  package:
    # Build libqoriq-rcw0 (runtime) and libqoriq-rcw-dev (headers/static/.pc)
    # .deb packages for the supported Ubuntu LTS releases (24.04, 26.04) and
    # the two latest Debian stable releases (12 bookworm, 13 trixie), on
    # both amd64 and arm64. All builds run inside a distro container so the
    # GitHub runner OS only provides the kernel and Docker.
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { name: amd64, runner: ubuntu-24.04 }
          - { name: arm64, runner: ubuntu-24.04-arm }
        distro:
          - { image: 'ubuntu:24.04',    slug: 'ubuntu-24.04' }
          - { image: 'ubuntu:26.04',    slug: 'ubuntu-26.04' }
          - { image: 'debian:bookworm', slug: 'debian-12' }
          - { image: 'debian:trixie',   slug: 'debian-13' }
    runs-on: ${{ matrix.arch.runner }}
    name: package (${{ matrix.distro.slug }}, ${{ matrix.arch.name }})
    container:
      image: ${{ matrix.distro.image }}
    steps:
      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates git \
            build-essential debhelper devscripts fakeroot \
            meson ninja-build pkg-config \
            libmcpp-dev libcmocka-dev pandoc

      - name: Checkout
        uses: actions/checkout@v4

      - name: dpkg-buildpackage
        run: dpkg-buildpackage -us -uc -b

      - name: Collect .deb artifacts
        run: |
          mkdir -p artifacts
          mv ../libqoriq-rcw*_*.deb artifacts/
          ls -la artifacts/

      - name: Upload .deb packages
        uses: actions/upload-artifact@v4
        with:
          name: debs-${{ matrix.distro.slug }}-${{ matrix.arch.name }}
          path: artifacts/*.deb
